name: Daily Comment Replies

on:
  schedule:
    - cron: "0 21 * * *"  # 9am Sydney time (UTC+12 approx)
  workflow_dispatch: {}

jobs:
  reply-to-comments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Check and reply to comments
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          AUTO_CONFIRM: "1"
        run: python3 check_and_reply.py

      - name: Commit replied log
        run: |
          git config user.name "swarmsignal-bot"
          git config user.email "actions@github.com"
          git add replied_comments.json 2>/dev/null || true
          git commit -m "Update replied comments log" || echo "Nothing to commit"
          git push
