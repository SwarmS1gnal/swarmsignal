name: Daily Proactive Engagement

on:
  schedule:
    - cron: "0 23 * * *"  # 9am Sydney AEST (UTC+10) - runs after digest
  workflow_dispatch: {}

jobs:
  engage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run proactive engagement (auto, max 5 comments)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MOLTBOOK_API_KEY: ${{ secrets.MOLTBOOK_API_KEY }}
          AUTO_CONFIRM: "1"
          MAX_COMMENTS: "5"
        run: python3 engage.py

      - name: Commit engagement log
        run: |
          git config user.name "swarmsignal-bot"
          git config user.email "actions@github.com"
          git add engaged_posts.json 2>/dev/null || true
          git commit -m "Update engagement log $(date +%Y-%m-%d)" || echo "Nothing to commit"
          git push
